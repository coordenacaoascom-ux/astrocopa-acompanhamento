<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroCopa · Futebol de Botão — Acompanhamento ao vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#00e676; --verde2:#00d4aa; --ciano:#00bcd4; --escuro:#0a2e1a;
    --card:rgba(6,32,20,.72); --card-borda:rgba(255,255,255,.18);
    --linha:rgba(255,255,255,.45); --ouro:#ffd54a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:'Barlow Condensed','Arial Narrow',sans-serif;color:#fff;
    background:linear-gradient(135deg,#00e64d,#00d4aa,#00bcd4);background-attachment:fixed;
    padding:20px 14px 50px;-webkit-font-smoothing:antialiased}

  .field{position:fixed;inset:14px;border:3px solid var(--linha);border-radius:6px;pointer-events:none;z-index:0;opacity:.45}
  .field::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:3px;background:var(--linha);transform:translateX(-50%)}
  .field::after{content:"";position:absolute;left:50%;top:50%;width:150px;height:150px;border:3px solid var(--linha);border-radius:50%;transform:translate(-50%,-50%)}
  .field .box{position:absolute;top:50%;width:120px;height:230px;border:3px solid var(--linha);transform:translateY(-50%)}
  .field .box.l{left:14px;border-left:none}
  .field .box.r{right:14px;border-right:none}

  .wrap{position:relative;z-index:1;max-width:1680px;margin:0 auto}

  header{position:relative;display:flex;align-items:center;justify-content:center;min-height:76px;margin-bottom:6px}
  .brand{position:absolute;left:6px;top:2px;display:flex;flex-direction:column;align-items:center;gap:1px}
  .brand .logoimg{height:56px;width:auto;display:block;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
  .brand .sub{font-weight:700;font-size:13px;letter-spacing:3px;text-shadow:0 2px 6px rgba(0,0,0,.4)}
  .maintitle{font-weight:800;letter-spacing:4px;font-size:clamp(22px,3.4vw,44px);text-align:center;text-shadow:0 3px 12px rgba(0,0,0,.4)}
  .reset{position:absolute;right:6px;top:6px}
  .btn{background:rgba(10,46,26,.8);color:#fff;border:1px solid var(--card-borda);
    font-family:inherit;font-weight:600;letter-spacing:1px;font-size:16px;padding:6px 12px;border-radius:10px;cursor:pointer;transition:.15s}
  .btn:hover{background:rgba(255,80,80,.85);border-color:#ff8080}

  .syncbadge{text-align:center;font-weight:700;letter-spacing:1px;font-size:13px;margin:0 auto 6px;
    display:inline-block;padding:3px 12px;border-radius:999px;background:rgba(4,26,16,.6);border:1px solid var(--card-borda)}
  .syncline{text-align:center;margin-bottom:4px}

  .champ{display:none;margin:6px auto;max-width:660px;text-align:center;
    background:linear-gradient(135deg,rgba(255,213,74,.95),rgba(255,183,0,.95));
    color:#4a3200;border-radius:16px;padding:12px 20px;font-weight:800;
    box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 0 0 3px rgba(255,255,255,.4)}
  .champ.on{display:block;animation:pop .5s ease}
  .champ .t{font-size:19px;letter-spacing:3px}
  .champ .n{font-size:38px;line-height:1.05;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:12px}
  .champ .n img{width:54px;height:36px;object-fit:cover;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

  .chavelabels{display:flex;justify-content:space-between;padding:0 10px;margin:2px 0 8px}
  .chavelabels span{font-weight:800;letter-spacing:5px;font-size:clamp(18px,2.4vw,28px);text-shadow:0 2px 8px rgba(0,0,0,.45)}

  .bracketwrap{overflow-x:auto;padding:6px 2px 12px}
  .bracket{display:flex;gap:14px;align-items:stretch;width:max-content;margin:0 auto}
  .round{display:flex;flex-direction:column;justify-content:space-around;gap:10px;min-width:120px;flex:0 0 auto}
  .rhead{text-align:center;font-weight:700;letter-spacing:2px;font-size:12.5px;opacity:.95;margin-bottom:2px;text-transform:uppercase}

  .match{position:relative;background:var(--card);border:1px solid var(--card-borda);
    border-radius:11px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.28)}
  .match .mlabel{font-size:10.5px;letter-spacing:1px;text-align:center;padding:3px 4px 1px;opacity:.7;font-weight:600;text-transform:uppercase}
  .team{display:flex;align-items:center;gap:7px;padding:7px 8px;cursor:default;
    border-top:1px solid rgba(255,255,255,.08);transition:.12s;font-size:15px;line-height:1.1;min-height:36px}
  .team:first-of-type{border-top:none}
  .team .flag{flex:none;min-width:38px;text-align:center;font-size:12px;font-weight:800;letter-spacing:.5px;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:2px 5px;color:#eafff4}
  .team.win .flag{background:rgba(0,230,118,.42);border-color:var(--verde);color:#fff}
  .team .flagimg{flex:none;width:30px;height:20px;object-fit:cover;border-radius:3px;
    box-shadow:0 1px 3px rgba(0,0,0,.45);border:1px solid rgba(0,0,0,.25)}
  .team .chk{flex:1;text-align:right;color:var(--verde);font-weight:800;font-size:14px;min-width:6px}
  .team .name{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team.pending .name{opacity:.5;font-style:italic;font-weight:500;font-size:13px}
  .team .score,.team .scoreview{flex:none;width:34px;margin-left:4px;text-align:center;font-family:inherit;
    font-weight:800;font-size:16px;color:#fff;background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:3px 2px;-moz-appearance:textfield}
  .team .scoreview{min-height:26px;display:flex;align-items:center;justify-content:center}
  .team .score::placeholder{color:rgba(255,255,255,.32);font-weight:600}
  .team .score::-webkit-outer-spin-button,.team .score::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .team .score:focus{outline:none;border-color:var(--verde);background:rgba(0,0,0,.5)}
  .team.win .score,.team.win .scoreview{border-color:var(--verde);background:rgba(0,230,118,.38)}
  .team.clickable{cursor:pointer}
  .team.clickable:hover{background:rgba(0,230,118,.18)}
  .team.win{background:linear-gradient(90deg,rgba(0,230,118,.32),rgba(0,230,118,.1));box-shadow:inset 3px 0 0 var(--verde)}

  .round.side-l .match::after{content:"";position:absolute;right:-14px;top:50%;width:14px;height:2px;background:var(--linha);transform:translateY(-50%)}
  .round.side-r .match::before{content:"";position:absolute;left:-14px;top:50%;width:14px;height:2px;background:var(--linha);transform:translateY(-50%)}

  .center{display:flex;flex-direction:column;justify-content:center;gap:14px;min-width:210px;flex:0 0 auto;align-self:center}
  .finaltitle{text-align:center;font-weight:800;letter-spacing:3px;font-size:22px;color:var(--ouro);text-shadow:0 2px 8px rgba(0,0,0,.4)}
  .thirdtitle{text-align:center;font-weight:800;letter-spacing:3px;font-size:16px;margin-top:4px;text-shadow:0 2px 6px rgba(0,0,0,.4)}
  .fbox{background:rgba(4,26,16,.5);border:1px solid var(--card-borda);border-radius:16px;padding:10px}
  .fbox.final{border-color:var(--ouro);box-shadow:0 0 26px rgba(255,213,74,.4)}
  .fbox .match{border:none;background:transparent;box-shadow:none}
  .fbox .team{font-size:17px;min-height:42px}
  .fbox .team .flagimg{width:34px;height:23px}
</style>
</head>

const M = Object.fromEntries(MATCHES.map(m=>[m.id,m]));
const PHASE_LABEL={rep:'Repescagem',oitavas:'Oitavas',quartas:'Quartas',semi:'Semifinal'};
const COLS=[
  {ph:'rep',ch:'A',side:'l'},{ph:'oitavas',ch:'A',side:'l'},{ph:'quartas',ch:'A',side:'l'},{ph:'semi',ch:'A',side:'l'},
  {center:true},
  {ph:'semi',ch:'B',side:'r'},{ph:'quartas',ch:'B',side:'r'},{ph:'oitavas',ch:'B',side:'r'},{ph:'rep',ch:'B',side:'r'},
];

const STORE='astrocopa_botao_v2';
let winners={}, scores={}, lastKey="";

function loadLocal(){ try{const d=JSON.parse(localStorage.getItem(STORE))||{}; winners=d.winners||{}; scores=d.scores||{};}catch(e){} }
function saveLocal(){ try{localStorage.setItem(STORE, JSON.stringify({winners,scores}));}catch(e){} }

function resolveSlot(slot){
  if(slot.t) return slot.t;
  if(slot.w) return winnerName(slot.w);
  if(slot.l) return loserName(slot.l);
  return null;
}
function winnerName(mid){ const w=winners[mid]; if(!w) return null; return resolveSlot(M[mid][w]); }
function loserName(mid){ const w=winners[mid]; if(!w) return null; return resolveSlot(M[mid][w==='a'?'b':'a']); }
function placeholder(slot){
  if(slot.w) return 'Vencedor '+M[slot.w].title;
  if(slot.l) return 'Perdedor '+M[slot.l].title;
  return '—';
}

const deps={};
MATCHES.forEach(m=>{ [m.a,m.b].forEach(s=>{ const ref=s.w||s.l; if(ref){ (deps[ref]=deps[ref]||[]).push(m.id);} }); });
function clearDownstream(mid){
  (deps[mid]||[]).forEach(d=>{
    if(winners[d]!==undefined) delete winners[d];
    if(scores[d]!==undefined) delete scores[d];
    clearDownstream(d);
  });
}

/* ---------- edição (só no editor) ---------- */
function commit(){ saveLocal(); publishState(); render(); }
function pick(mid, side){
  if(!IS_EDITOR) return;
  if(winners[mid]===side) delete winners[mid]; else winners[mid]=side;
  clearDownstream(mid); commit();
}
function setScore(mid, side, val){
  const v=(val||'').trim();
  scores[mid]=scores[mid]||{};
  if(v==='') delete scores[mid][side]; else scores[mid][side]=v;
  if(!Object.keys(scores[mid]).length) delete scores[mid];
  const s=scores[mid]||{};
  if(s.a!==undefined && s.b!==undefined){
    const a=parseFloat(s.a), b=parseFloat(s.b);
    if(!isNaN(a) && !isNaN(b) && a!==b){
      const nw=a>b?'a':'b';
      if(winners[mid]!==nw){ winners[mid]=nw; clearDownstream(mid); }
    }
  }
  commit();
}

/* ---------- sincronização via ntfy ---------- */
function setStatus(txt){ const b=document.getElementById('syncbadge'); if(b) b.textContent=txt; }
let pubTimer=null;
function publishNow(){
  if(!IS_EDITOR) return;
  const payload=JSON.stringify({winners,scores,updatedAt:Date.now()});
  fetch(NTFY_URL,{method:'POST',body:payload})
    .then(()=>setStatus('🟢 Sincronizado — acompanhamento atualizado'))
    .catch(()=>setStatus('⚠️ Sem internet — salvo localmente'));
}
function publishState(){ if(!IS_EDITOR) return; clearTimeout(pubTimer); setStatus('⏳ Enviando…'); pubTimer=setTimeout(publishNow, 400); }

function applyRemote(msgStr){
  try{
    const d=JSON.parse(msgStr);
    const key=JSON.stringify({w:d.winners||{}, s:d.scores||{}});
    if(key===lastKey) return;   // nada mudou -> não redesenha (evita piscar)
    lastKey=key;
    winners=d.winners||{}; scores=d.scores||{};
    render();
  }catch(e){}
}
// pega a ÚLTIMA mensagem publicada (o ntfy entrega em ordem cronológica)
function fetchLatest(sinceParam){
  return fetch(NTFY_URL+'/json?poll=1&since='+sinceParam).then(r=>r.text()).then(t=>{
    const lines=t.trim().split('\n').filter(Boolean);
    for(let i=lines.length-1;i>=0;i--){
      try{ const o=JSON.parse(lines[i]); if(o.event==='message' && o.message){ applyRemote(o.message); return; } }catch(e){}
    }
  }).catch(()=>{});
}
function startViewer(){
  setStatus('🔌 Conectando…');
  fetchLatest('all').then(()=>setStatus('🔴 AO VIVO — atualiza sozinho'));
  // GARANTIA: consulta a central a cada 3s (funciona mesmo se o tempo real cair / rede corporativa)
  setInterval(()=>fetchLatest('10m'), 3000);
  // ao voltar pra aba, atualiza na hora
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) fetchLatest('10m'); });
  // tempo real por cima (atualização instantânea quando disponível)
  try{
    const es=new EventSource(NTFY_URL+'/sse');
    es.onopen=()=>setStatus('🔴 AO VIVO — atualiza sozinho');
    es.onmessage=(e)=>{ try{ const o=JSON.parse(e.data); if(o.event==='message' && o.message) applyRemote(o.message); }catch(err){} };
  }catch(e){}
}

/* ---------- render ---------- */
function teamEl(mid, side){
  const m=M[mid], slot=m[side], name=resolveSlot(slot), decided=winners[mid];
  const el=document.createElement('div'); el.className='team';
  if(name){
    if(decided===side) el.classList.add('win'); else if(decided) el.classList.add('lose');
    el.title=name;
    el.innerHTML=`<span class="flag">${CODE[name]||'?'}</span>`+
      `<img class="flagimg" src="${FLAGIMG[name]||''}" alt="${name}">`+
      `<span class="chk">${decided===side?'✔':''}</span>`;
    const sVal=(scores[mid]&&scores[mid][side]!==undefined)?scores[mid][side]:'';
    if(IS_EDITOR){
      el.classList.add('clickable');
      el.onclick=(e)=>{ if(e.target.classList.contains('score')) return; pick(mid,side); };
      const inp=document.createElement('input');
      inp.className='score'; inp.type='number'; inp.min='0'; inp.placeholder='–'; inp.setAttribute('inputmode','numeric');
      inp.value=sVal; inp.title='Placar';
      inp.onclick=e=>e.stopPropagation();
      inp.oninput=()=>{ scores[mid]=scores[mid]||{}; const v=inp.value.trim(); if(v==='') delete scores[mid][side]; else scores[mid][side]=v; };
      inp.onchange=()=>setScore(mid,side,inp.value);
      el.appendChild(inp);
    }else{
      const sb=document.createElement('span'); sb.className='scoreview'; sb.textContent=(sVal===''?'–':sVal);
      el.appendChild(sb);
    }
  }else{
    el.classList.add('pending');
    el.innerHTML=`<span class="flag">•</span><span class="name">${placeholder(slot)}</span>`;
  }
  return el;
}
function matchEl(mid,{showLabel=true}={}){
  const box=document.createElement('div'); box.className='match';
  if(showLabel){ const l=document.createElement('div'); l.className='mlabel'; l.textContent=M[mid].title; box.appendChild(l); }
  box.appendChild(teamEl(mid,'a')); box.appendChild(teamEl(mid,'b'));
  return box;
}
function columnEl(spec){
  const col=document.createElement('div'); col.className='round side-'+spec.side;
  const h=document.createElement('div'); h.className='rhead'; h.textContent=PHASE_LABEL[spec.ph]; col.appendChild(h);
  MATCHES.filter(m=>m.ch===spec.ch && m.ph===spec.ph).forEach(m=>col.appendChild(matchEl(m.id)));
  return col;
}
function centerEl(){
  const c=document.createElement('div'); c.className='center';
  const t=document.createElement('div'); t.className='finaltitle'; t.textContent='🏆 GRANDE FINAL';
  const fb=document.createElement('div'); fb.className='fbox final'; fb.appendChild(matchEl('final',{showLabel:false}));
  const t2=document.createElement('div'); t2.className='thirdtitle'; t2.textContent='🥉 3º LUGAR';
  const tb=document.createElement('div'); tb.className='fbox'; tb.appendChild(matchEl('terceiro',{showLabel:false}));
  c.append(t,fb,t2,tb); return c;
}
function render(){
  const root=document.getElementById('bracket'); root.innerHTML='';
  COLS.forEach(spec=> root.appendChild(spec.center?centerEl():columnEl(spec)));
  const champ=winnerName('final'); const banner=document.getElementById('champ');
  if(champ){ banner.classList.add('on'); document.getElementById('champName').innerHTML=`<img src="${FLAGIMG[champ]||''}" alt=""> ${champ}`; }
  else banner.classList.remove('on');
}

/* ---------- init ---------- */
document.getElementById('maintitle').textContent = IS_EDITOR ? 'CHAVEAMENTO OFICIAL' : 'ACOMPANHAMENTO AO VIVO';
if(IS_EDITOR){
  document.getElementById('reset').onclick=()=>{
    if(confirm('Reiniciar todo o chaveamento? Isso apaga os resultados aqui E no acompanhamento de todos.')){
      winners={}; scores={}; commit();
    }
  };
  loadLocal();
  render();
  // ao abrir, adota o estado compartilhado (evita apagar resultados ao abrir em outro aparelho)
  fetch(NTFY_URL+'/json?poll=1&since=all').then(r=>r.text()).then(t=>{
    const lines=t.trim().split('\n').filter(Boolean); let last=null;
    for(let i=lines.length-1;i>=0;i--){ try{const o=JSON.parse(lines[i]); if(o.event==='message'&&o.message){last=o.message;break;} }catch(e){} }
    let remote=null; try{ remote=last?JSON.parse(last):null; }catch(e){}
    const rHas = remote && (Object.keys(remote.winners||{}).length || Object.keys(remote.scores||{}).length);
    const lHas = Object.keys(winners).length || Object.keys(scores).length;
    if(rHas){ winners=remote.winners||{}; scores=remote.scores||{}; saveLocal(); render(); setStatus('🟢 Sincronizado'); }
    else if(lHas){ publishNow(); }
    else { setStatus('🟢 Pronto para começar'); }
  }).catch(()=>setStatus('⚠️ Sem internet — editando local'));
  setInterval(publishNow, 240000);      // mantém o cache "vivo" (a cada 4 min)
}else{
  document.getElementById('reset').style.display='none';
  render();
  startViewer();
}
</script>
